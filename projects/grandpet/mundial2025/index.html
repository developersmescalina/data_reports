<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grand Goleador — Simulador de Journeys</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --surface-3: #242424;
    --green-accent: #1DB954;
    --green-dark: #158a3e;
    --green-light: #25D366;
    --wa-green: #005C4B;
    --wa-green-light: #025144;
    --wa-bubble-out: #005C4B;
    --wa-bubble-in: #1F2C34;
    --wa-bg: #0B141A;
    --wa-header: #1F2C34;
    --text: #E9EDEF;
    --text-muted: #8696A0;
    --text-dark: #667781;
    --white: #ffffff;
    --orange: #F5A623;
    --red: #EF4444;
    --blue: #53BDEB;
    --gold: #FFD700;
    --border: rgba(255,255,255,0.06);
    --radius: 12px;
    --radius-lg: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  /* ============ HOME SCREEN ============ */
  #home {
    height: 100%;
    display: flex;
    flex-direction: column;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #home.hidden { transform: translateX(-100%); pointer-events: none; }

  .home-header {
    padding: 20px 20px 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .home-header .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .home-header .brand-icon {
    width: 36px;
    height: 36px;
    background: var(--green-accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .home-header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .home-header h1 span { color: var(--green-accent); }
  .home-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  .home-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 30px;
    -webkit-overflow-scrolling: touch;
  }

  .category-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 20px 0 10px 4px;
  }
  .category-label:first-child { margin-top: 8px; }

  .journey-card {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .journey-card:hover { background: var(--surface-3); transform: translateY(-1px); }
  .journey-card:active { transform: scale(0.98); }

  .jc-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .jc-content { flex: 1; min-width: 0; }
  .jc-content h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .jc-content p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .jc-arrow {
    color: var(--text-dark);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* Category card colors */
  .cat-registro .jc-icon { background: rgba(29,185,84,0.15); }
  .cat-premio .jc-icon { background: rgba(255,215,0,0.15); }
  .cat-sorteo .jc-icon { background: rgba(83,189,235,0.15); }
  .cat-alerta .jc-icon { background: rgba(245,166,35,0.15); }
  .cat-bloqueo .jc-icon { background: rgba(239,68,68,0.15); }
  .cat-ayuda .jc-icon { background: rgba(255,255,255,0.08); }

  /* ============ CHAT SCREEN ============ */
  #chat {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    background: var(--wa-bg);
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 20;
  }
  #chat.active { transform: translateX(0); }

  .chat-header {
    background: var(--wa-header);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 56px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .chat-back {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 20px;
    border-radius: 50%;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .chat-back:hover { background: rgba(255,255,255,0.06); }
  .chat-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--green-accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .chat-info { flex: 1; min-width: 0; }
  .chat-info h2 {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chat-info small {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* WA-style background pattern */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px 20px;
    -webkit-overflow-scrolling: touch;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .msg-group { margin-bottom: 4px; }

  .bubble {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
    animation: bubbleIn 0.3s ease-out;
    word-wrap: break-word;
    white-space: pre-line;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .bubble.bot {
    background: var(--wa-bubble-in);
    border-top-left-radius: 2px;
    margin-right: auto;
    color: var(--text);
  }
  .bubble.bot b, .bubble.bot strong { color: var(--white); }

  .bubble.user {
    background: var(--wa-bubble-out);
    border-top-right-radius: 2px;
    margin-left: auto;
    color: var(--text);
  }

  .bubble .time {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: right;
    margin-top: 4px;
  }

  .system-msg {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    padding: 6px 14px;
    border-radius: 8px;
    margin: 12px auto;
    max-width: 80%;
    animation: bubbleIn 0.3s ease-out;
  }

  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--wa-bubble-in);
    border-radius: 10px;
    border-top-left-radius: 2px;
    animation: bubbleIn 0.2s ease-out;
  }
  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingDot 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ============ BUTTONS AREA ============ */
  .chat-buttons {
    padding: 10px 14px 16px;
    background: var(--wa-header);
    border-top: 1px solid rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 45vh;
    overflow-y: auto;
  }

  .btn-wa {
    width: 100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: var(--surface-2);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-wa:hover { background: var(--surface-3); border-color: rgba(255,255,255,0.15); }
  .btn-wa:active { transform: scale(0.98); }
  .btn-wa .btn-emoji { font-size: 16px; flex-shrink: 0; }

  .btn-wa.primary {
    background: var(--wa-green);
    border-color: var(--green-accent);
    color: var(--white);
    font-weight: 600;
  }
  .btn-wa.primary:hover { background: var(--green-dark); }

  .btn-wa.home-btn {
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.12);
    color: var(--text-muted);
    justify-content: center;
    font-size: 13px;
  }

  .btn-divider {
    font-size: 11px;
    color: var(--text-dark);
    text-align: center;
    padding: 4px 0 2px;
  }

  /* Landing page simulation overlay */
  .landing-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0d2818 0%, #0a1f14 100%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    animation: fadeIn 0.4s ease;
    text-align: center;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .landing-overlay .scratch-card {
    width: 260px;
    height: 180px;
    background: linear-gradient(135deg, #1a472a, #2d7a4a);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    border: 2px solid rgba(255,255,255,0.1);
    margin: 20px 0;
    position: relative;
    overflow: hidden;
  }
  .scratch-card .ball {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    animation: revealBall 0.5s ease backwards;
  }
  .scratch-card .ball:nth-child(1) { animation-delay: 0.3s; }
  .scratch-card .ball:nth-child(2) { animation-delay: 0.6s; }
  .scratch-card .ball:nth-child(3) { animation-delay: 0.9s; }
  @keyframes revealBall {
    from { opacity: 0; transform: scale(0.3) rotate(-20deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }

  .scratch-card.win { border-color: var(--gold); box-shadow: 0 0 40px rgba(255,215,0,0.2); }
  .scratch-card.lose { border-color: rgba(255,255,255,0.08); }

  .landing-overlay h2 {
    font-size: 24px;
    font-weight: 700;
    margin-top: 16px;
  }
  .landing-overlay h2.win-title { color: var(--gold); }
  .landing-overlay h2.lose-title { color: var(--text); }
  .landing-overlay p {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 8px;
    line-height: 1.5;
  }
  .landing-overlay .counter {
    margin-top: 16px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .landing-overlay .counter b { color: var(--green-accent); }

  .landing-btn {
    margin-top: 24px;
    padding: 14px 32px;
    background: var(--green-accent);
    color: var(--bg);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .landing-btn:hover { background: var(--green-light); }
  .landing-btn:active { transform: scale(0.97); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>

  { id: 'registro', label: '🎮  Registro y Juego', color: 'cat-registro' },
  { id: 'premio', label: '🏆  Premios y Canje', color: 'cat-premio' },

// ============================================================
//  RENDER HOME
// ============================================================

function renderHome() {
  const body = $('homeBody');
  let html = '';
  CATEGORIES.forEach(cat => {
    const journeys = JOURNEYS.filter(j => j.cat === cat.id);
    if (!journeys.length) return;
    html += `<div class="category-label">${cat.label}</div>`;
    journeys.forEach(j => {
      html += `
        <div class="journey-card ${cat.color}" onclick="openJourney('${j.id}')">
          <div class="jc-icon">${j.icon}</div>
          <div class="jc-content">
            <h3>${j.title}</h3>
            <p>${j.desc}</p>
          </div>
          <div class="jc-arrow">›</div>
        </div>`;
    });
  });
  body.innerHTML = html;
}

// ============================================================
//  CHAT ENGINE
// ============================================================

function openJourney(id) {
  const journey = JOURNEYS.find(j => j.id === id);
  if (!journey) return;
  currentJourney = journey;
  currentStep = 0;
  chatBody.innerHTML = '';
  chatButtons.innerHTML = '';
  homeEl.classList.add('hidden');
  chatEl.classList.add('active');
  playSteps();
}

function goHome() {
  chatEl.classList.remove('active');
  homeEl.classList.remove('hidden');
  landingOverlay.style.display = 'none';
  currentJourney = null;
  currentStep = 0;
}

$('chatBack').onclick = goHome;

async function playSteps() {
  if (!currentJourney) return;
  const steps = currentJourney.steps;

  while (currentStep < steps.length) {
    const step = steps[currentStep];

    if (step.type === 'system') {
      addSystem(step.text);
      currentStep++;
      await wait(400);
    }
    else if (step.type === 'bot') {
      await showTyping(800 + Math.random() * 600);
      addBubble(step.text, 'bot');
      currentStep++;
      await wait(300);
    }
    else if (step.type === 'user') {
      addBubble(step.text, 'user');
      currentStep++;
      await wait(500);
    }
    else if (step.type === 'buttons') {
      showButtons(step.items);
      return; // wait for user click
    }
    else if (step.type === 'landing') {
      showLanding(step.variant);
      return; // wait for user interaction on landing
    }
  }
}

function addBubble(html, who) {
  const div = document.createElement('div');
  div.className = 'msg-group';
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  div.innerHTML = `<div class="bubble ${who}">${html}<div class="time">${time}</div></div>`;
  chatBody.appendChild(div);
  scrollChat();
}

function addSystem(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  chatBody.appendChild(div);
  scrollChat();
}

async function showTyping(ms) {
  const div = document.createElement('div');
  div.className = 'msg-group typing-group';
  div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  chatBody.appendChild(div);
  scrollChat();
  await wait(ms);
  div.remove();
}

function showButtons(items) {
  chatButtons.innerHTML = '';
  items.forEach(item => {
    if (item.home) {
      const d = document.createElement('div');
      d.className = 'btn-divider';
      d.textContent = '— o —';
      chatButtons.appendChild(d);
    }
    const btn = document.createElement('button');
    btn.className = 'btn-wa' + (item.primary ? ' primary' : '') + (item.home ? ' home-btn' : '');
    btn.innerHTML = (item.emoji ? `<span class="btn-emoji">${item.emoji}</span>` : '') + item.text;
    btn.onclick = () => handleButton(item);
    chatButtons.appendChild(btn);
  });
}

function handleButton(item) {
  chatButtons.innerHTML = '';

  if (item.action === 'home') {
    goHome();
    return;
  }

  if (item.action && item.action.startsWith('journey_')) {
    const jid = item.action.replace('journey_', '');
    openJourney(jid);
    return;
  }

  if (item.action && item.action.startsWith('menu_')) {
    openJourney(item.action);
    return;
  }

  if (item.action && item.action.startsWith('landing_')) {
    currentStep++;
    playSteps();
    return;
  }

  if (item.action === 'skip') {
    currentStep += 2; // skip next step
    playSteps();
    return;
  }

  // default: next
  currentStep++;
  playSteps();
}

// ============================================================
//  LANDING PAGE SIMULATION
// ============================================================

function showLanding(variant) {
  let balls, isWin, title, subtitle, compras;

  if (variant === 'win_fisico' || variant === 'win_cupon') {
    balls = ['⚽','⚽','⚽'];
    isWin = true;
    title = '¡¡¡HAT-TRICK!!!';
    subtitle = 'Ganaste un instant win. Ahora confirma si compraste en línea o en tienda física';
    compras = '1';
  } else if (variant === 'lose' ) {
    balls = ['⚽','❌','⚽'];
    isWin = false;
    title = '¡Casi!';
    subtitle = 'Tu compra quedó registrada para los sorteos';
    compras = '1';
  } else if (variant === 'lose_recurrent') {
    balls = ['❌','⚽','❌'];
    isWin = false;
    title = '¡Casi!';
    subtitle = 'Tu compra quedó registrada para los sorteos';
    compras = '4';
  }

  landingOverlay.style.display = 'flex';
  landingOverlay.innerHTML = `
    <div style="font-size:13px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Rasca Gol — Grand Goleador</div>
    <div class="scratch-card ${isWin ? 'win' : 'lose'}">
      ${balls.map(b => `<div class="ball">${b}</div>`).join('')}
    </div>
    <h2 class="${isWin ? 'win-title' : 'lose-title'}">${title}</h2>
    <p>${subtitle}</p>
    <div class="counter">Llevas <b>${compras} compra${compras>1?'s':''}</b> registrada${compras>1?'s':''}</div>
    <button class="landing-btn" onclick="closeLanding()">↩️ Regresar a WhatsApp</button>
  `;
}

function closeLanding() {
  landingOverlay.style.display = 'none';
  currentStep++; // move past landing step
  playSteps();
}

// ============================================================

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollChat() { chatBody.scrollTop = chatBody.scrollHeight; }
